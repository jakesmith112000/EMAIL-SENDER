<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Logs – Postmark Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to modes</a>
        <h1>📋 Send Logs</h1>
        <div class="form-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
                <h3>Recent email attempts</h3>
                <div>
                    <button id="downloadFailedBtn" class="btn btn-primary" style="background: #ef4444; margin-right: 0.5rem;">📥 Download Failed</button>
                    <button id="clearLogsBtn" class="btn btn-secondary" style="background: #dc2626;">🗑️ Clear All Logs</button>
                </div>
            </div>
            <div id="logsContainer">
                <div style="text-align:center; padding: 2rem;">Loading logs...</div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script>
        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs?limit=200');
                const logs = await res.json();
                const container = document.getElementById('logsContainer');
                if (!logs.length) {
                    container.innerHTML = '<div style="text-align:center; padding:2rem;">No logs found.</div>';
                    return;
                }
                const table = document.createElement('table');
                table.className = 'log-table';
                table.innerHTML = `
                    <thead>
                        <tr><th>Time</th><th>Recipient</th><th>Subject</th><th>Status</th><th>Error</th></tr>
                    </thead>
                    <tbody>
                        ${logs.map(log => `
                            <tr>
                                <td>${new Date(log.created_at).toLocaleString()}</td>
                                <td>${log.recipient}</td>
                                <td>${log.subject.substring(0, 50)}</td>
                                <td class="status-${log.status}">${log.status}</td>
                                <td>${log.error ? log.error.substring(0, 80) : ''}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
                container.innerHTML = '';
                container.appendChild(table);
            } catch (err) {
                console.error(err);
                document.getElementById('logsContainer').innerHTML = '<div class="alert alert-error">Failed to load logs.</div>';
            }
        }

        async function clearLogs() {
            if (!confirm('⚠️ Are you sure you want to delete ALL logs? This action cannot be undone.')) return;
            try {
                const res = await fetch('/api/logs/clear', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert('✅ Logs cleared successfully');
                    fetchLogs();
                } else {
                    alert('❌ Error: ' + data.error);
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        }

        document.getElementById('downloadFailedBtn').addEventListener('click', () => {
            window.location.href = '/api/logs/failed/download';
        });
        document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);

        fetchLogs();
        setInterval(fetchLogs, 15000);
    </script>
</body>
</html>
