<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Postmark Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional tweaks specific to auth page */
        .auth-container {
            max-width: 500px;
            margin: 60px auto;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid #334155;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 2rem;
            transition: 0.2s;
        }
        .tab-btn.active {
            color: #3b82f6;
            background: rgba(59,130,246,0.15);
        }
        .form-card {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 0.9rem;
            color: #f1f5f9;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
        }
        .error-msg, .success-msg {
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
        }
        .error-msg {
            background: rgba(239,68,68,0.2);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.4);
        }
        .success-msg {
            background: rgba(16,185,129,0.2);
            color: #34d399;
            border: 1px solid rgba(16,185,129,0.4);
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            margin-bottom: 2rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container auth-container">
        <div class="form-card">
            <h2>✨ Welcome to Postmark Flow</h2>
            <p class="sub">Sign in or create an account</p>
            
            <div class="tabs">
                <button class="tab-btn active" id="loginTab">Login</button>
                <button class="tab-btn" id="registerTab">Register</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div id="loginError" class="error-msg" style="display: none;"></div>
                <div id="loginSuccess" class="success-msg" style="display: none;"></div>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label>📧 Username or Email</label>
                        <input type="text" name="identifier" placeholder="e.g., admin or admin@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Password</label>
                        <input type="password" name="password" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
            
            <!-- Register Form (hidden initially) -->
            <div id="registerForm" style="display: none;">
                <div id="registerError" class="error-msg" style="display: none;"></div>
                <div id="registerSuccess" class="success-msg" style="display: none;"></div>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label>👤 Username</label>
                        <input type="text" name="username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Password (min 6 characters)</label>
                        <input type="password" name="password" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginDiv = document.getElementById('loginForm');
        const registerDiv = document.getElementById('registerForm');
        
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginDiv.style.display = 'block';
            registerDiv.style.display = 'none';
        });
        
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            loginDiv.style.display = 'none';
            registerDiv.style.display = 'block';
        });
        
        // Login handler
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = e.target.identifier.value;
            const password = e.target.password.value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: identifier, password })
                });
                const data = await res.json();
                if (res.ok) {
                    successDiv.textContent = '✅ Login successful! Redirecting...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error';
                errorDiv.style.display = 'block';
            }
        });
        
        // Register handler
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = e.target.username.value;
            const email = e.target.email.value;
            const password = e.target.password.value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    successDiv.textContent = '✅ Registration successful! Please log in.';
                    successDiv.style.display = 'block';
                    // Switch to login tab after 2 seconds
                    setTimeout(() => {
                        loginTab.click();
                        e.target.reset();
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
